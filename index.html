<!DOCTYPE html>

<html>

<head>

<title>Offroad AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Offroad Navigation Intelligence</h1>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('image')">Image Analysis</button>
  <button class="tab-btn" onclick="switchTab('video')">Video Analysis</button>
  <button class="tab-btn" onclick="switchTab('live')">Live Analysis</button>
</div>

<div id="image-tab" class="tab-content active">
<div class="glass">

<h2>Upload Terrain Image</h2>

<div class="drop-zone" id="dropZone">

<p>Drag & Drop Image</p>

<input type="file" id="fileInput" accept="image/*">

</div>

<button onclick="predictImage()">Analyze Terrain</button>

</div>


<div class="glass results">

<div>

<h3>Input Image</h3>

<img id="preview">

</div>

<div>

<h3>Segmentation Mask</h3>

<img id="maskPreview">

</div>

</div>


<div class="glass metrics">

<p id="terrain"></p>

<p id="decision"></p>

</div>
</div>

<div id="video-tab" class="tab-content">
<div class="glass">

<h2>Upload Terrain Video</h2>

<div class="drop-zone" id="dropZoneVideo">

<p>Drag & Drop Video</p>

<input type="file" id="fileInputVideo" accept="video/*">

</div>

<button onclick="predictVideo()">Analyze Video</button>

<p id="videoInfo"></p>

</div>

<div class="glass results" id="videoResultsContainer" style="display:none;">

<h3>Video Analysis Results</h3>

<div id="videoFramesResults" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(350px, 1fr)); gap:20px;"></div>

</div>

<div class="glass metrics">

<p id="videoDecisions"></p>

<p id="videoFinalDecision"></p>

</div>
</div>

<div id="live-tab" class="tab-content">
<div class="glass">

<h2>Live Terrain Analysis</h2>

<p style="font-size: 14px; color: #38bdf8;">Real-time analysis using your webcam</p>

<div style="margin: 20px 0;">
<button onclick="startLiveAnalysis()" id="startBtn">📹 Start Live Stream</button>
<button onclick="stopLiveAnalysis()" id="stopBtn" style="display:none;">⏹️ Stop Stream</button>
</div>

<div id="liveVideoContainer" style="display:none; text-align:center;">
<video id="liveVideo" style="width:100%; max-width:500px; border-radius:10px; background:black; margin:10px 0;"></video>
</div>

</div>

<div class="glass results" id="liveResultsContainer" style="display:none;">

<h3>Live Analysis</h3>

<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px;">

<div style="border:1px solid rgba(255,255,255,0.2); padding:15px; border-radius:10px;">
<h4>Live Feed</h4>
<img id="liveFrameCapture" style="width:100%; border-radius:8px; background:black;">
</div>

<div style="border:1px solid rgba(255,255,255,0.2); padding:15px; border-radius:10px;">
<h4>Segmentation Mask</h4>
<img id="liveMaskCapture" style="width:100%; border-radius:8px; background:black;">
</div>

</div>

</div>

<div class="glass results" id="previousResultsContainer" style="display:none; padding: 20px;">
<h3>Last 3 Frames History</h3>
<div id="previousResultsList" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:15px;"></div>
</div>

<div class="glass metrics">

<p id="liveTerrainType"></p>
<p id="liveDecision"></p>
<p id="liveFrameCount" style="font-size: 12px; color: #94a3b8;"></p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
